services:
  - type: web
    name: giftzone-agent
    runtime: node
    rootDir: agent
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: SKIP_INDEX
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: AGENT_NAME
        value: GiftZone AI
      # Các biến sau cần nhập tay trên Render dashboard:
      - key: ZALO_IMEI
        sync: false
      - key: ZALO_COOKIE
        sync: false
      - key: ZALO_USER_AGENT
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: DATABASE_URL
        sync: false
